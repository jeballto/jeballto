# pre-commit hooks configuration
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

# Global excludes - applied to all hooks
exclude: '(^\.agents/|\.svg|.swiftlint-baseline.json$)'

repos:
  - repo: https://github.com/realm/SwiftLint
    rev: 0.57.0
    hooks:
      - id: swiftlint
        name: SwiftLint
        types: [swift]
        args: [--no-cache]

  - repo: https://github.com/nicklockwood/SwiftFormat
    rev: 0.54.6
    hooks:
      - id: swiftformat
        name: SwiftFormat
        types: [swift]
        args: ['--config', '.swiftformat']

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.28.0
    hooks:
      - id: check-jsonschema
        name: OpenAPI Spec Validation
        files: ^openapi/.*\.yaml$
        types: [yaml]
        args:
          - '--schemafile'
          - 'https://spec.openapis.org/oas/3.0/schema/2021-09-28'

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: ShellCheck
        args: ['--severity=warning']

  # YAML validation and formatting
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        name: Check YAML syntax
        exclude: ^openapi/  # OpenAPI YAML checked separately
      - id: end-of-file-fixer
        name: Fix end of files
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: ['--fix=lf']

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        name: Markdown Lint
        args: ['--fix']

  # Security - detect secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets

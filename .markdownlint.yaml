# Markdown linting configuration
# See: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

# MD013: Line length - disabled for now
MD013: false

# MD033: Allow inline HTML (useful for badges, etc)
MD033: false

# MD040: Allow code blocks without language specification
MD040: false

# MD041: First line in file should be top-level heading
MD041: false

# MD036: Allow bold text as sub-headings (used in troubleshooting docs)
MD036: false

# MD029: Allow ordered lists with incrementing prefixes
MD029: false

# MD024: Allow duplicate headings in different sections
MD024: false

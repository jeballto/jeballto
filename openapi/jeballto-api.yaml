          description: Number of images that failed to delete
        ipswCacheCleared:
          type: boolean
          description: Whether the IPSW download cache was cleared
        configDeleted:
          type: boolean
          description: Whether config.json was deleted (hard mode only)
        logsDeleted:
          type: boolean
          description: Whether log files were deleted (hard mode only)
        willTerminate:
          type: boolean
          description: Whether the application will terminate after this response (hard mode only)
        errors:
          type: array
          nullable: true
          items:
            type: string
          description: List of errors encountered during reset

    RegistryLoginResponse:
      type: object
      required:
        - registry
        - status
      properties:
        registry:
          type: string
          description: Registry hostname
        status:
          type: string
          description: Authentication status
          example: authenticated
        message:
          type: string
          nullable: true
          description: Status message

    SuccessResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: Whether the operation succeeded
        message:
          type: string
          nullable: true
          description: Status message

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Error code
              enum:
                - UNAUTHORIZED
                - INVALID_ID
                - INVALID_REQUEST
                - NOT_FOUND
                - CREATE_FAILED
                - START_FAILED
                - STOP_FAILED
                - PAUSE_FAILED
                - RESUME_FAILED
                - DELETE_FAILED
                - SSH_NOT_CONFIGURED
                - VNC_NOT_CONFIGURED
                - VNC_ENABLE_FAILED
                - VNC_DISABLE_FAILED
                - GUI_OPEN_FAILED
                - GUI_CLOSE_FAILED
                - VM_LIMIT_REACHED
                - INSTALL_FAILED
                - EXECUTE_FAILED
                - INVALID_STATE
                - IMAGE_NOT_FOUND
                - IMAGE_PULL_FAILED
                - IMAGE_PULL_CANCELLED
                - IMAGE_PUSH_FAILED
                - IMAGE_PUSH_CANCELLED
                - INVALID_REFERENCE
                - REGISTRY_AUTH_FAILED
                - REGISTRY_LOGOUT_FAILED
                - CONFIRMATION_REQUIRED
                - CLONE_FAILED
                - WIPE_FAILED
                - RESET_FAILED
                - CONFIG_UPDATE_FAILED
                - INTERNAL_ERROR
            message:
              type: string
              description: Error message
            details:
              type: object
              nullable: true
              additionalProperties:
                type: string
              description: Additional error details

    JeballtofileRequest:
      type: object
      required:
        - name
        - steps
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: VM name
          example: my-dev-vm
        source:
          type: string
          description: >
            IPSW source for macOS installation. Required when steps contain
            an 'install' step. Accepts HTTPS URL, file:// URL, or absolute path.
          example: "https://updates.cdn-apple.com/.../RestoreImage.ipsw"
        resources:
          $ref: '#/components/schemas/VMResourcesDTO'
        steps:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/JeballtofileStep'
          description: Ordered list of steps to execute

    JeballtofileStep:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [install, start, stop, gui-open, gui-close, keystrokes, execute, wait]
          description: Step type
        keystrokes:
          type: array
          items:
            type: string
          description: Keystroke sequences (required for 'keystrokes' type)
        command:
          type: string
          description: Shell command to execute (required for 'execute' type)
        user:
          type: string
          default: admin
          description: SSH user (for 'execute' type)
        password:
          type: string
          default: admin
          description: SSH password (for 'execute' type)
        timeout:
          type: integer
          minimum: 1
          maximum: 600
          default: 30
          description: Command timeout in seconds (for 'execute' type)
        seconds:
          type: integer
          minimum: 1
          maximum: 300
          description: Wait duration in seconds (required for 'wait' type)

    JeballtofileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Execution ID for status polling
        vmId:
          type: string
          format: uuid
          description: ID of the created VM
        status:
          type: string
          enum: [running]
        currentStep:
          type: integer
        totalSteps:
          type: integer
        message:
          type: string

    JeballtofileStatusResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vmId:
          type: string
          format: uuid
        status:
          type: string
          enum: [running, completed, failed, cancelled]
        currentStep:
          type: integer
        totalSteps:
          type: integer
        stepResults:
          type: array
          items:
            $ref: '#/components/schemas/JeballtofileStepResult'
        error:
          type: string
          nullable: true

    JeballtofileStepResult:
      type: object
      properties:
        step:
          type: integer
          description: Step index (0-based)
        type:
          type: string
          enum: [install, start, stop, gui-open, gui-close, keystrokes, execute, wait]
        status:
          type: string
          enum: [in_progress, completed, cancelled, failed]
        message:
          type: string
          nullable: true

    JeballtofileListResponse:
      type: object
      properties:
        executions:
          type: array
          items:
            $ref: '#/components/schemas/JeballtofileStatusResponse'
        total:
          type: integer

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: INVALID_REQUEST
              message: Invalid request body

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHORIZED
              message: Invalid or missing authentication token

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: NOT_FOUND
              message: VM not found

    ConcurrentVMLimit:
      description: Concurrent VM limit reached (max 2 on Apple Silicon)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: VM_LIMIT_REACHED
              message: Cannot start VM - 2 VMs already active (max 2)

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: INTERNAL_ERROR
              message: Internal server error

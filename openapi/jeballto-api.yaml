  /vms/{id}/execute:
    post:
      tags:
        - lifecycle
      summary: Execute command via SSH
      description: |
        Runs a shell command on the VM via SSH. Requires VM to be running
        with SSH (Remote Login) enabled. The default username is `admin`.
        Password authentication is used only when `password` is supplied;
        otherwise SSH keys are used.
      operationId: executeCommandOnVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandExecuteRequest'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          $ref: '#/components/responses/MaintenanceInProgress'
        '200':
          description: Command executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandExecuteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: >
            VM is in the wrong state, SSH forwarding is not configured, or a
            required capability is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidState:
                  value:
                    error:
                      code: INVALID_STATE
                      message: "VM must be running for command execution"
                sshNotConfigured:
                  value:
                    error:
                      code: SSH_NOT_CONFIGURED
                      message: SSH port not configured for this VM
                capabilityUnavailable:
                  value:
                    error:
                      code: CAPABILITY_UNAVAILABLE
                      message: "portForwarding is unavailable: Capability is disabled"
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          description: Command timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: EXECUTE_TIMEOUT
                  message: "Command timed out after 30 seconds"

  /vms/{id}/keystrokes:
    post:
      tags:
        - lifecycle
      summary: Inject keystrokes
      description: |
        Injects keystroke sequences into the VM. Works in both running
        and installing states. Useful for automating macOS setup wizard before SSH is available.

        Keystroke DSL supports:
        - Plain text: each character is typed as keyDown+keyUp
        - `<enter>`, `<tab>`, `<spacebar>`, `<esc>`, `<delete>` - special keys
        - `<left>`, `<right>`, `<up>`, `<down>` - arrow keys
        - `<f1>` through `<f12>` - function keys
        - `<home>`, `<end>`, `<pageup>`, `<pagedown>` - navigation keys
        - `<leftCmdOn>`, `<leftCmdOff>` - hold/release Command
        - `<leftShiftOn>`, `<leftShiftOff>` - hold/release Shift
        - `<leftCtrlOn>`, `<leftCtrlOff>` - hold/release Control
        - `<leftAltOn>`, `<leftAltOff>` - hold/release Option
        - `<wait5s>`, `<wait10s>` - pause for N seconds
      operationId: injectKeystrokesOnVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeystrokesRequest'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          $ref: '#/components/responses/MaintenanceInProgress'
        '200':
          description: Keystrokes injected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeystrokesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is in wrong state for this operation or required capability is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidState:
                  value:
                    error:
                      code: INVALID_STATE
                      message: "VM must be running or installing for keystroke injection"
                capabilityUnavailable:
                  value:
                    error:
                      code: CAPABILITY_UNAVAILABLE
                      message: "keystrokeInjection is unavailable: Requires macOS 26.0 or newer"
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/clone:
    post:
      tags:
        - vms
      summary: Clone VM
      description: >
        Copy an existing VM bundle with a new UUID, MachineIdentifier, and MAC
        address. Optional CPU, memory, and enlarged disk values can override the
        source resources. The clone can be ephemeral and can have its own maximum
        lifetime. The source VM must be stopped unless force=true is used.
      operationId: cloneVM
      parameters:
        - $ref: '#/components/parameters/vmId'
        - name: force
          in: query
          required: false
          description: Force-stop the source VM before cloning
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloneVMRequest'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          $ref: '#/components/responses/MaintenanceInProgress'
        '201':
          description: VM cloned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Source VM is not in a clonable state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "Source VM must be stopped before cloning (use force=true to auto-stop)"
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          description: Clone disk growth timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: CLONE_FAILED
                  message: Clone disk resize timed out


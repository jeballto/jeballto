        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      tags:
        - config
      summary: Update config
      description: >
        Update writable configuration values. Only include fields to change.
        The request must contain at least one effective writable field.
        Logging and image changes are persisted to disk and take effect immediately.
        Networking changes are persisted and take effect after an agent restart.
        SSH and VNC ranges must not overlap each other or the API port.
        Read-only fields (api.port, api.host, etc.) cannot be updated via this endpoint.
      operationId: updateConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConfigRequest'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

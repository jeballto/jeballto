  /images/pull:
    post:
      tags:
        - images
      summary: Pull image
      description: >
        Pull an OCI image from a registry. Every tag is resolved to its current
        registry digest. A valid local record is reused only when that digest
        matches; a changed mutable tag replaces the stale local bundle.
        Digest-pinned references reuse a valid matching local record. The
        request always creates a pull operation record. When `async` is false
        or omitted, the endpoint blocks until the pull reaches a terminal
        status and returns the final operation status with `image` populated on
        success. When `async` is true, the endpoint returns immediately with
        the started operation status and a `statusUrl`. Without `timeout`, there
        is no caller-supplied deadline for the complete pull. Registry
        reachability checks and short ORAS metadata commands, including digest
        resolution and manifest fetch, retain bounded internal deadlines. When
        set, `timeout` applies across the pull, including reference resolution
        and shared-resource waits, until durable commit. An internal deadline
        can fail earlier, cancellation cleanup may finish later, and a durable
        commit wins a concurrent timeout.
        Jeballto VM Bundle Format v1 is required. The stable media type
        family is `application/vnd.jeballto.vm.bundle`,
        `application/vnd.jeballto.vm.bundle.config+json`, and
        `application/vnd.jeballto.vm.bundle.chunk+zstd`. These media types
        identify the artifact family; required config field `formatVersion`
        selects its schema and chunk semantics. Pre-1.0 unversioned artifacts
        and unknown format versions are rejected before chunk layers are
        fetched. At most 8 pull and push operations may be active in total.
      operationId: pullImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PullImageRequest'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          description: Destructive maintenance is active or the image registry is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                maintenance:
                  value:
                    error:
                      code: MAINTENANCE_IN_PROGRESS
                      message: The agent is performing destructive maintenance
                registryUnavailable:
                  value:
                    error:
                      code: IMAGE_PULL_FAILED
                      message: Registry is unavailable
        '200':
          description: Pull operation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageOperationStatusResponse'
        '202':
          description: Pull operation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageOperationStatusResponse'
        '400':
          description: Invalid request, reference, or Jeballto image artifact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidRequest:
                  value:
                    error:
                      code: INVALID_REQUEST
                      message: Timeout must be positive if specified
                invalidReference:
                  value:
                    error:
                      code: INVALID_REFERENCE
                      message: Invalid image reference
                unsupportedImageFormat:
                  value:
                    error:
                      code: UNSUPPORTED_IMAGE_FORMAT
                      message: >-
                        Unsupported image format: unversioned images created
                        before 1.0.0 are not supported; re-push the VM using
                        Jeballto VM Bundle Format v1
                invalidImage:
                  value:
                    error:
                      code: INVALID_IMAGE
                      message: 'Invalid image: Invalid VM image config'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: A required capability is unavailable or the matching local image is in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                capabilityUnavailable:
                  value:
                    error:
                      code: CAPABILITY_UNAVAILABLE
                      message: Required image capability is unavailable
                imageInUse:
                  value:
                    error:
                      code: IMAGE_IN_USE
                      message: The matching local image is in use
        '499':
          description: Image pull was cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: Image pull timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'


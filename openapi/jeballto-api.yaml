  /vms/{id}/vnc:
    post:
      tags:
        - networking
      summary: Enable VNC forwarding
      description: >
        Enable VNC port forwarding for a VM. Allocates a host port from the
        configured VNC port range and creates a TCP proxy to the VM's VNC
        server (port 5900). The VM must be running. Idempotent - if VNC is
        already enabled, returns the current connection info.
        Screen Sharing must be enabled in the macOS guest.
      operationId: enableVNC
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          description: Destructive maintenance is active or no configured VNC port is available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                maintenance:
                  value:
                    error:
                      code: MAINTENANCE_IN_PROGRESS
                      message: The agent is performing destructive maintenance
                portCapacity:
                  value:
                    error:
                      code: VNC_ENABLE_FAILED
                      message: No available VNC ports in configured range
        '200':
          description: VNC forwarding enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VNCInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: >
            VM is not running, NAT setup is not ready, another operation owns

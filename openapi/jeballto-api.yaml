          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidState:
                  value:
                    error:
                      code: INVALID_STATE
                      message: "VM must be running to enable VNC forwarding"
                capabilityUnavailable:
                  value:
                    error:
                      code: CAPABILITY_UNAVAILABLE
                      message: "portForwarding is unavailable: Capability is disabled"
                natNotReady:
                  value:
                    error:
                      code: VNC_ENABLE_FAILED
                      message: VM has no NAT IP address, cannot set up VNC forwarding
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - networking
      summary: Disable VNC forwarding
      description: >
        Disable VNC port forwarding for a VM. Stops the TCP proxy and

openapi: 3.0.3
info:
  title: Jeballto VM Agent API
  description: REST API for managing macOS virtual machines on Apple Silicon
  version: 1.0.0-beta.1
  contact:
    name: Jeballto Project
  license:
    name: See LICENSE

servers:
  - url: http://localhost:8011/v1
    description: Local development server

security:
  - bearerAuth: []

tags:
  - name: health
    description: Health and status endpoints
  - name: vms
    description: Virtual machine management
  - name: lifecycle
    description: VM lifecycle operations
  - name: installation
    description: macOS installation
  - name: networking
    description: Network, SSH, and VNC
  - name: gui
    description: GUI window management
  - name: monitoring
    description: State and events
  - name: images
    description: OCI image management
  - name: registries
    description: OCI registry authentication
  - name: config
    description: Runtime configuration management
  - name: jeballtofiles
    description: Jeballtofile blueprint execution
  - name: system
    description: System-level operations
  - name: auth
    description: Authentication utilities

paths:
  /health:
    get:
      tags:
        - health
      summary: Health check
      description: Check agent health status
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Agent is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /vms:
    post:
      tags:
        - vms
      summary: Create VM
      description: Create a new virtual machine
      operationId: createVM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVMRequest'
      responses:
        '201':
          description: VM created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags:
        - vms
      summary: List VMs
      description: List all virtual machines with optional pagination
      operationId: listVMs
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return (1-1000)
          schema:
            type: integer
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          required: false
          description: Number of results to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of VMs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - vms
      summary: Wipe all VMs
      description: >
        Delete all VMs and clear the database. Requires confirm=true query
        parameter as a safety guard. Active asynchronous image operations are
        cancelled before VM deletion starts. Each VM is force-stopped before
        deletion.
      operationId: wipeAllVMs
      parameters:
        - name: confirm
          in: query
          required: true
          description: Must be "true" to confirm the wipe operation
          schema:
            type: string
            enum:
              - 'true'
      responses:
        '200':
          description: Wipe completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WipeAllResponse'
        '400':
          description: Missing confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: CONFIRMATION_REQUIRED
                  message: "Add ?confirm=true to confirm deletion of all VMs"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}:
    get:
      tags:
        - vms
      summary: Get VM
      description: Get virtual machine details
      operationId: getVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: VM details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - vms
      summary: Delete VM
      description: >
        Delete a virtual machine and its files. The VM must be stopped first
        unless force=true is used, which auto-stops the VM before deletion.
      operationId: deleteVM
      parameters:
        - $ref: '#/components/parameters/vmId'
        - name: force
          in: query
          required: false
          description: Force-stop the VM before deleting
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: VM deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is not in a deletable state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "VM must be stopped before deletion"
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      tags:
        - vms
      summary: Update VM
      description: >
        Update name and/or resources (CPU, memory, disk) for a VM.
        Name can be changed in any non-deleted state.
        Resource changes require the VM to be stopped or created.
        Disk can only be enlarged, not shrunk. Resource changes take effect on next VM start.
        Guest OS filesystem must be expanded separately after disk resize.
      operationId: updateVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVMRequest'
      responses:
        '200':
          description: VM updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is not in a valid state for resource modification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "VM must be stopped or created to update resources"
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/start:
    post:
      tags:
        - lifecycle
      summary: Start VM
      description: Start a virtual machine
      operationId: startVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: VM started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/ConcurrentVMLimit'
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/stop:
    post:
      tags:
        - lifecycle
      summary: Stop VM
      description: Stop a virtual machine. Idempotent when the VM is already stopped.
      operationId: stopVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: VM stopped, or already stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/pause:
    post:
      tags:
        - lifecycle
      summary: Pause VM
      description: Pause a running virtual machine
      operationId: pauseVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: VM paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/resume:
    post:
      tags:
        - lifecycle
      summary: Resume VM
      description: Resume a paused virtual machine
      operationId: resumeVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: VM resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/install:
    post:
      tags:
        - installation
      summary: Install macOS
      description: Start macOS installation in the VM (async operation)
      operationId: installVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallVMRequest'
      responses:
        '202':
          description: Installation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/ConcurrentVMLimit'
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/install/status:
    get:
      tags:
        - installation
      summary: Installation status
      description: Get macOS installation status
      operationId: getInstallStatus
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: Installation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/ssh:
    get:
      tags:
        - networking
      summary: Get SSH info
      description: >
        Get SSH connection information. The VM must be installed (not in
        CREATED or INSTALLING state).
      operationId: getSSHInfo
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: SSH connection info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is not yet installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "VM must be installed before SSH can be used"
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags:
        - networking
      summary: Enable SSH forwarding
      description: >
        Enable SSH port forwarding for a VM. Allocates a host port from the
        configured SSH port range and creates a TCP proxy to the VM's SSH
        server (port 22). The VM must be RUNNING and have a detected NAT IP.
        Idempotent - if SSH is already enabled, returns the current connection info.
        Remote Login must be enabled in the macOS guest.
      operationId: enableSSH
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: SSH forwarding enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is not in RUNNING state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "VM must be RUNNING to enable SSH forwarding"
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - networking
      summary: Disable SSH forwarding
      description: >
        Disable SSH port forwarding for a VM. Stops the TCP proxy and
        releases the allocated port. The VM must be installed (not in
        CREATED or INSTALLING state).
      operationId: disableSSH
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: SSH forwarding disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHInfoResponse'
              example:
                host: "127.0.0.1"
                port: 0
                status: disabled
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is not yet installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "VM must be installed before SSH can be managed"
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/vnc:
    post:
      tags:
        - networking
      summary: Enable VNC forwarding
      description: >
        Enable VNC port forwarding for a VM. Allocates a host port from the
        configured VNC port range and creates a TCP proxy to the VM's VNC
        server (port 5900). The VM must be RUNNING. Idempotent - if VNC is
        already enabled, returns the current connection info.
        Screen Sharing must be enabled in the macOS guest.
      operationId: enableVNC
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: VNC forwarding enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VNCInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is not in RUNNING state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "VM must be RUNNING to enable VNC forwarding"
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - networking
      summary: Disable VNC forwarding
      description: >
        Disable VNC port forwarding for a VM. Stops the TCP proxy and
        releases the allocated port. The VM must be installed (not in
        CREATED or INSTALLING state).
      operationId: disableVNC
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: VNC forwarding disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VNCInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is not yet installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "VM must be installed before VNC can be managed"
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags:
        - networking
      summary: Get VNC info
      description: >
        Get VNC connection information. The VM must be installed (not in
        CREATED or INSTALLING state).
      operationId: getVNCInfo
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: VNC connection info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VNCInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is not yet installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "VM must be installed before VNC can be used"
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/state:
    get:
      tags:
        - monitoring
      summary: Get VM state
      description: Get current VM state
      operationId: getVMState
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: VM state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMStateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/events:
    get:
      tags:
        - monitoring
      summary: Get VM events
      description: Get recent VM events
      operationId: getVMEvents
      parameters:
        - $ref: '#/components/parameters/vmId'
        - name: limit
          in: query
          description: Maximum number of events to return
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
      responses:
        '200':
          description: VM events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/gui:
    post:
      tags:
        - gui
      summary: Open GUI
      description: Open a graphical window displaying the VM screen. Requires VM to be running. Idempotent - if GUI is already open, brings window to front.
      operationId: openGUI
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: GUI opened successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GUIStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - gui
      summary: Close GUI
      description: Close the graphical window for a VM. Idempotent - if GUI is already closed, returns success. Does not affect VM state.
      operationId: closeGUI
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: GUI closed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GUIStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags:
        - gui
      summary: Get GUI status
      description: Check if a GUI window is open for a VM
      operationId: getGUIStatus
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: GUI status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GUIStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/screenshot:
    get:
      tags:
        - gui
      summary: Capture VM screenshot
      description: |
        Captures a screenshot of the VM's display and returns it as a PNG image.
        Works headlessly without requiring a GUI window to be open. The VM must be
        in RUNNING state. Useful for CI/CD debugging and automated visual testing.
      operationId: captureScreenshot
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '200':
          description: Screenshot captured successfully
          content:
            image/png:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is not in RUNNING state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/execute:
    post:
      tags:
        - lifecycle
      summary: Execute command via SSH
      description: |
        Runs a shell command on the VM via SSH. Requires VM to be RUNNING
        with SSH (Remote Login) enabled. Uses password authentication by default (admin/admin).
      operationId: executeCommandOnVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandExecuteRequest'
      responses:
        '200':
          description: Command executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandExecuteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is in wrong state for this operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "VM must be running for command execution"
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          description: Command timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: EXECUTE_FAILED
                  message: "Command timed out after 30 seconds"

  /vms/{id}/keystrokes:
    post:
      tags:
        - lifecycle
      summary: Inject keystrokes
      description: |
        Injects keystroke sequences into the VM. Works in both RUNNING
        and INSTALLING states. Useful for automating macOS setup wizard before SSH is available.

        Keystroke DSL supports:
        - Plain text: each character is typed as keyDown+keyUp
        - `<enter>`, `<tab>`, `<spacebar>`, `<esc>`, `<delete>` - special keys
        - `<left>`, `<right>`, `<up>`, `<down>` - arrow keys
        - `<f1>` through `<f12>` - function keys
        - `<home>`, `<end>`, `<pageup>`, `<pagedown>` - navigation keys
        - `<leftCmdOn>`, `<leftCmdOff>` - hold/release Command
        - `<leftShiftOn>`, `<leftShiftOff>` - hold/release Shift
        - `<leftCtrlOn>`, `<leftCtrlOff>` - hold/release Control
        - `<leftAltOn>`, `<leftAltOff>` - hold/release Option
        - `<wait5s>`, `<wait10s>` - pause for N seconds
      operationId: injectKeystrokesOnVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeystrokesRequest'
      responses:
        '200':
          description: Keystrokes injected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeystrokesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is in wrong state for this operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "VM must be running or installing for keystroke injection"
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/clone:
    post:
      tags:
        - vms
      summary: Clone VM
      description: >
        Create a 1:1 copy of an existing VM with a new UUID, MachineIdentifier,
        and MAC address. The source VM must be stopped unless force=true is used.
      operationId: cloneVM
      parameters:
        - $ref: '#/components/parameters/vmId'
        - name: force
          in: query
          required: false
          description: Force-stop the source VM before cloning
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloneVMRequest'
      responses:
        '201':
          description: VM cloned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Source VM is not in a clonable state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "Source VM must be stopped before cloning (use force=true to auto-stop)"
        '500':
          $ref: '#/components/responses/InternalError'

  /config:
    get:
      tags:
        - config
      summary: Get config
      description: >
        Returns the current runtime configuration. Sensitive values (API token,
        file paths, binary paths) are intentionally excluded for security.
      operationId: getConfig
      responses:
        '200':
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      tags:
        - config
      summary: Update config
      description: >
        Update writable configuration values. Only include fields to change.
        Changes are persisted to disk and take effect immediately. Read-only
        fields (api.port, api.host, etc.) cannot be updated via this endpoint.
      operationId: updateConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConfigRequest'
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /images:
    get:
      tags:
        - images
      summary: List images
      description: List all locally stored OCI images with optional pagination
      operationId: listImages
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return (1-1000)
          schema:
            type: integer
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          required: false
          description: Number of results to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of images
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - images
      summary: Wipe all images
      description: >
        Delete all locally stored OCI images. Requires confirm=true query
        parameter as a safety guard. Active asynchronous image operations are
        cancelled before image deletion starts.
      operationId: wipeAllImages
      parameters:
        - name: confirm
          in: query
          required: true
          description: Must be "true" to confirm the wipe operation
          schema:
            type: string
            enum:
              - 'true'
      responses:
        '200':
          description: Wipe completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WipeAllResponse'
        '400':
          description: Missing confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: CONFIRMATION_REQUIRED
                  message: "Add ?confirm=true to confirm deletion of all images"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /images/{id}:
    get:
      tags:
        - images
      summary: Get image
      description: Get details of a locally stored OCI image
      operationId: getImage
      parameters:
        - $ref: '#/components/parameters/imageId'
      responses:
        '200':
          description: Image details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - images
      summary: Delete image
      description: Delete a locally stored OCI image and its files. Returns 409
        if the image is the source of an active push operation.
      operationId: deleteImage
      parameters:
        - $ref: '#/components/parameters/imageId'
      responses:
        '204':
          description: Image deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Image is in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /images/pull:
    post:
      tags:
        - images
      summary: Pull image
      description: >
        Pull an OCI image from a registry. If the image already exists locally,
        returns the existing record without re-pulling. By default this blocks
        until pull completes. Set `async` to true to start the pull in the
        background and poll `/images/pull/{operationId}/status`.
        By default there is no timeout (unlimited). Use the optional `timeout`
        field to set a limit in seconds.
      operationId: pullImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PullImageRequest'
      responses:
        '200':
          description: Image pulled (or already local)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagePullResponse'
        '202':
          description: Image pull started asynchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagePullResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '499':
          description: Image pull was cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: Image pull timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /images/pull/{operationId}:
    delete:
      tags:
        - images
      summary: Cancel image pull
      description: Cancel a running asynchronous image pull operation.
      operationId: cancelImagePull
      parameters:
        - $ref: '#/components/parameters/imageOperationId'
      responses:
        '200':
          description: Image pull cancellation requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageOperationStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Image pull operation is not running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /images/pull/{operationId}/status:
    get:
      tags:
        - images
      summary: Get image pull status
      description: Get progress for an asynchronous image pull operation.
      operationId: getImagePullStatus
      parameters:
        - $ref: '#/components/parameters/imageOperationId'
      responses:
        '200':
          description: Image pull operation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageOperationStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /images/push:
    post:
      tags:
        - images
      summary: Push image
      description: >
        Push a VM bundle or existing local image to an OCI registry.
        Use the `source` field with format 'vm:<uuid>' or 'image:<uuid>'.
        The VM must be stopped before pushing to ensure a consistent disk image.
        A connectivity check is performed before compression begins to fail fast
        if the registry is unreachable.
        The bundle is split into zstd-compressed chunks during transfer.
        By default this blocks until push completes. Set `async` to true to
        start the push in the background and poll
        `/images/push/{operationId}/status`. By default there is no timeout
        (unlimited). Use the optional `timeout` field to set a limit in seconds.
      operationId: pushImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushImageRequest'
      responses:
        '200':
          description: Image pushed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagePushResponse'
        '202':
          description: Image push started asynchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagePushResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is not in a stopped state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '499':
          description: Image push was cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          description: Registry is unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: Image push timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /images/push/{operationId}:
    delete:
      tags:
        - images
      summary: Cancel image push
      description: Cancel a running asynchronous image push operation.
      operationId: cancelImagePush
      parameters:
        - $ref: '#/components/parameters/imageOperationId'
      responses:
        '200':
          description: Image push cancellation requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageOperationStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Image push operation is not running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /images/push/{operationId}/status:
    get:
      tags:
        - images
      summary: Get image push status
      description: Get progress for an asynchronous image push operation.
      operationId: getImagePushStatus
      parameters:
        - $ref: '#/components/parameters/imageOperationId'
      responses:
        '200':
          description: Image push operation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageOperationStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /registries/login:
    post:
      tags:
        - registries
      summary: Registry login
      description: Authenticate to an OCI registry. Credentials are stored by oras.
      operationId: registryLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistryLoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryLoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: REGISTRY_AUTH_FAILED
                  message: Authentication failed
        '500':
          $ref: '#/components/responses/InternalError'

  /registries/logout:
    post:
      tags:
        - registries
      summary: Registry logout
      description: Remove stored credentials for an OCI registry
      operationId: registryLogout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistryLogoutRequest'
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /jeballtofiles:
    post:
      tags:
        - jeballtofiles
      summary: Execute a Jeballtofile blueprint
      description: >
        Validates and executes a Jeballtofile blueprint. Creates a VM and runs
        all steps asynchronously. Returns immediately with an execution ID for
        status polling.
      operationId: createJeballtofile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JeballtofileRequest'
          application/yaml:
            schema:
              $ref: '#/components/schemas/JeballtofileRequest'
          text/yaml:
            schema:
              $ref: '#/components/schemas/JeballtofileRequest'
      responses:
        '202':
          description: Jeballtofile execution started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JeballtofileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags:
        - jeballtofiles
      summary: List Jeballtofile executions
      description: Returns all active and recent Jeballtofile executions.
      operationId: listJeballtofiles
      responses:
        '200':
          description: List of executions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JeballtofileListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /jeballtofiles/{executionId}:
    get:
      tags:
        - jeballtofiles
      summary: Get Jeballtofile execution status
      description: Returns the current status and per-step results of a Jeballtofile execution.
      operationId: getJeballtofileStatus
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Execution status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JeballtofileStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - jeballtofiles
      summary: Delete a Jeballtofile execution
      description: >
        Removes a completed, failed, or cancelled Jeballtofile execution from memory.
        Running executions cannot be deleted - cancel them first.
      operationId: deleteJeballtofile
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Execution deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Cannot delete a running execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /jeballtofiles/{executionId}/cancel:
    post:
      tags:
        - jeballtofiles
      summary: Cancel a Jeballtofile execution
      description: >
        Requests cancellation of a running Jeballtofile execution.
        The current step will finish before execution halts.
      operationId: cancelJeballtofile
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cancellation requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Execution is not running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /system/reset:
    post:
      tags:
        - system
      summary: Reset system
      description: >
        Reset the agent to a clean state. Soft mode deletes all VMs, images, and
        the IPSW cache but keeps configuration and logs. Hard mode deletes everything
        the application stores and terminates the process so the next startup is
        completely fresh. Active asynchronous image operations are cancelled
        before reset cleanup starts. Requires confirm=true as a safety guard.
      operationId: systemReset
      parameters:
        - name: confirm
          in: query
          required: true
          description: Must be "true" to confirm the reset operation
          schema:
            type: string
            enum:
              - 'true'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemResetRequest'
      responses:
        '200':
          description: Reset completed (hard mode will terminate the process shortly after)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemResetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/verify:
    get:
      tags:
        - auth
      summary: Verify auth token
      description: >
        Returns 200 if the bearer token is valid. Since the auth middleware runs before
        every route handler, a 200 response confirms the token is accepted.
        Returns 401 if the token is missing or invalid.
      operationId: verifyAuth
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - ok
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: >
        Bearer token from agent configuration.
        Pass as: Authorization: Bearer <your-token>

  parameters:
    vmId:
      name: id
      in: path
      description: VM identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid
    imageId:
      name: id
      in: path
      description: Image identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid
    imageOperationId:
      name: operationId
      in: path
      description: Image operation identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreateVMRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: VM name
          example: my-macos-vm
        resources:
          allOf:
            - $ref: '#/components/schemas/VMResourcesDTO'
          description: >
            Hardware resources. Must NOT be set together with `image` - use
            PATCH /v1/vms/{id} to change resources after cloning from an image.
        image:
          type: string
          nullable: true
          description: >
            OCI image reference (e.g. registry.example.com/vms/macos:latest).
            When provided, the image is pulled if not already local and the
            VM is created from it. The VM will be in STOPPED state (already installed).
            Cannot be combined with `resources`.
          example: registry.example.com/vms/macos:latest
        ephemeral:
          type: boolean
          default: false
          description: >
            When true, the VM is automatically deleted when it reaches a terminal
            state (stopped or error), and is also stopped+deleted on agent shutdown.
            Useful for CI/CD jobs where VMs are disposable.
        lifetimeSeconds:
          type: integer
          minimum: 1
          maximum: 604800
          nullable: true
          description: >
            Optional maximum lifetime in seconds. Countdown starts the first time
            the VM enters RUNNING state and is persisted, so it survives agent
            restarts. On expiry the VM is stopped (and, if ephemeral, deleted).
          example: 3600

    VMResourcesDTO:
      type: object
      properties:
        cpuCount:
          type: integer
          minimum: 1
          maximum: 32
          description: Number of CPU cores
          example: 4
        memorySize:
          oneOf:
            - type: integer
              format: int64
              minimum: 2147483648
            - type: string
              pattern: '^\d+(\.\d+)?\s*(MB|GB|mb|gb)$'
          description: >
            Memory size as bytes (integer) or human-readable string (e.g., "4GB", "512MB").
            Minimum 2 GB.
          example: "4GB"
        diskSize:
          oneOf:
            - type: integer
              format: int64
              minimum: 21474836480
            - type: string
              pattern: '^\d+(\.\d+)?\s*(MB|GB|mb|gb)$'
          description: >
            Disk size as bytes (integer) or human-readable string (e.g., "64GB", "128GB").
            Minimum 20 GB.
          example: "64GB"

    CloneVMRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Name for the cloned VM
          example: cloned-vm
        resources:
          $ref: '#/components/schemas/VMResourcesDTO'
        ephemeral:
          type: boolean
          default: false
          description: >
            When true, the cloned VM is automatically deleted when it reaches a
            terminal state (stopped or error).

    UpdateVMRequest:
      type: object
      description: >
        At least one field must be provided. Name can be changed in any non-deleted state.
        Resource changes require the VM to be stopped or created.
        Disk can only be enlarged, not shrunk.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: New name for the VM
          example: "renamed-vm"
        resources:
          type: object
          properties:
            cpuCount:
              type: integer
              minimum: 1
              maximum: 32
              description: Number of virtual CPU cores
              example: 8
            memorySize:
              oneOf:
                - type: integer
                  format: int64
                  minimum: 2147483648
                - type: string
                  pattern: '^\d+(\.\d+)?\s*(MB|GB|TB|mb|gb|tb)$'
              description: >
                Memory as bytes (integer) or human-readable string (e.g., "8GB", "16GB").
                Minimum 2 GB.
              example: "16GB"
            diskSize:
              oneOf:
                - type: integer
                  format: int64
                  minimum: 21474836480
                - type: string
                  pattern: '^\d+(\.\d+)?\s*(MB|GB|TB|mb|gb|tb)$'
              description: >
                Disk size as bytes (integer) or human-readable string (e.g., "128GB").
                Minimum 20 GB. Can only be enlarged, not shrunk.
              example: "128GB"

    WipeAllResponse:
      type: object
      required:
        - deleted
        - failed
      properties:
        deleted:
          type: integer
          description: Number of VMs successfully deleted
        failed:
          type: integer
          description: Number of VMs that failed to delete
        errors:
          type: array
          nullable: true
          items:
            type: string

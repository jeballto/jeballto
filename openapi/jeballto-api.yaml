          $ref: '#/components/schemas/ImageResponse'
        message:
          type: string
          nullable: true
          description: Status message
        operationId:
          type: string
          format: uuid
          nullable: true
          description: Async operation ID, present when `async` is true
        statusUrl:
          type: string
          nullable: true
          description: Relative URL for polling async operation status

    ImagePushResponse:
      type: object
      required:
        - reference
        - status
      properties:
        reference:
          type: string
          description: OCI image reference
        status:
          type: string
          description: Push status
          example: completed
        digest:
          type: string
          nullable: true
          description: Image digest
        image:
          $ref: '#/components/schemas/ImageResponse'
        message:
          type: string
          nullable: true
          description: Status message
        operationId:
          type: string
          format: uuid
          nullable: true
          description: Async operation ID, present when `async` is true
        statusUrl:
          type: string
          nullable: true
          description: Relative URL for polling async operation status

    ImageOperationStatusResponse:
      type: object
      required:
        - operationId
        - type
        - reference
        - status
        - chunksCompleted
        - bytesCompleted
        - startedAt
        - updatedAt
      properties:
        operationId:
          type: string
          format: uuid
          description: Async image operation identifier
        type:
          type: string
          enum:
            - pull
            - push
          description: Image operation type
        reference:
          type: string
          description: OCI image reference
        source:
          type: string
          nullable: true
          description: Push source, if this is a push operation
        status:
          type: string
          enum:
            - started
            - running
            - cancelling
            - completed
            - failed
            - cancelled
          description: Current operation status. `cancelling` means cancellation was requested and cleanup is still running.
        stage:
          type: string
          enum:
            - compressing
            - uploading
          nullable: true
          description: >
            Current push stage, when a push has started compression or upload
            work. Pull operations do not report a single stage because blob
            fetches, decompression, disk writes, and validation can overlap.
        progress:
          type: number
          format: double
          nullable: true
          minimum: 0
          maximum: 1
          description: >
            Overall progress from 0.0 to 1.0, rounded to two decimal places,
            when known. Pull progress is based on completed compressed OCI
            artifact bytes. Push compression and upload each account for half
            of the overall progress.
        stageProgress:
          type: number
          format: double
          nullable: true
          minimum: 0
          maximum: 1
          description: >
            Current push stage progress from 0.0 to 1.0, rounded to two
            decimal places, when known. Pull operations leave this null.
        averageSpeedMBps:
          type: number
          format: double
          nullable: true
          minimum: 0
          description: >
            Average artifact-flow speed in MB/s, rounded to two decimal places,
            when known. This is not system network throughput. Pull has no
            exclusive stages, so this is full-flow speed: completed compressed
            OCI artifact bytes over the pull operation timeline. Push has
            sequential stages, so this is per-stage speed: uncompressed VM
            bundle bytes while compressing, then compressed OCI blob bytes while
            uploading.
        chunksCompleted:
          type: integer
          minimum: 0
          description: >
            Number of completed chunk units. Pull counts completed compressed
            chunk blobs. Push counts local chunks while compressing, then
            compressed OCI blobs while uploading.
        chunksTotal:
          type: integer
          nullable: true
          minimum: 0
          description: >
            Total chunk units expected, when known. Pull uses the number of
            chunk layers in the manifest. Push uses the current stage total.
        bytesCompleted:
          type: integer
          format: int64
          minimum: 0
          description: >
            Bytes completed for the operation or current push stage. Pull
            counts completed compressed OCI artifact bytes, including the config
            blob. Push counts uncompressed VM bundle bytes while compressing,
            then compressed OCI blob bytes while uploading.
        bytesTotal:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: >
            Total bytes expected for the operation or current push stage, when
            known. Pull uses compressed OCI artifact bytes. Push uses the
            current stage total.
        startedAt:
          type: string
          format: date-time
          description: Operation start time
        updatedAt:
          type: string
          format: date-time
          description: Last status update time
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Completion, failure, or cancellation time
        digest:
          type: string
          nullable: true
          description: Image digest once available
        image:
          allOf:
            - $ref: '#/components/schemas/ImageResponse'
          nullable: true
          description: Completed image record, when available
        error:
          type: string
          nullable: true
          description: Failure or cancellation message

    ConfigResponse:
      type: object
      required:
        - api
        - logging
        - networking
        - images
      properties:
        api:
          type: object
          required:
            - port
            - host
            - enableHTTPS
            - maxConcurrentRequests
          properties:
            port:
              type: integer
              description: API server port
            host:
              type: string
              description: API server host
            enableHTTPS:
              type: boolean
              description: Whether HTTPS is enabled
            maxConcurrentRequests:
              type: integer
              description: Maximum concurrent requests
        logging:
          type: object
          required:
            - level
            - enableFileLogging
            - retentionDays
            - maxTotalSize
          properties:
            level:
              type: string
              enum:
                - debug
                - info
                - warning
                - error
              description: Current log level
            enableFileLogging:
              type: boolean
              description: Whether file logging is enabled
            retentionDays:
              type: integer
              description: Number of days to retain log files
            maxTotalSize:
              type: string
              description: 'Maximum total log storage (e.g. "2GB", "500MB")'
            timezone:
              type: string
              nullable: true
              description: >
                IANA timezone identifier for log timestamps (e.g. 'UTC', 'America/New_York').
                When null, the system timezone is used.
        networking:
          type: object
          required:
            - sshPortRangeStart
            - sshPortRangeEnd
            - autoEnableSSHForwarding
            - vncPortRangeStart
            - vncPortRangeEnd
          properties:
            sshPortRangeStart:
              type: integer
              description: Start of SSH port range
            sshPortRangeEnd:
              type: integer
              description: End of SSH port range
            autoEnableSSHForwarding:
              type: boolean
              description: Whether SSH forwarding is auto-enabled
            vncPortRangeStart:
              type: integer
              description: Start of VNC port range
            vncPortRangeEnd:
              type: integer
              description: End of VNC port range
        images:
          type: object
          required:
            - insecureRegistries
            - maxParallelImageBlobTransfers
            - maxParallelImageCompressions
            - maxParallelImageDecompressions
            - maxParallelImageDiskWrites
          properties:
            defaultRegistry:
              type: string
              nullable: true
              description: Default OCI registry
            insecureRegistries:
              type: array
              items:
                type: string
              description: Registries that use HTTP instead of HTTPS
            maxParallelImageBlobTransfers:
              type: integer
              minimum: 1
              maximum: 64
              description: >
                Maximum number of OCI image blob transfers to run concurrently.
                This controls ORAS blob fetch and push processes. Default is 16.
            maxParallelImageCompressions:
              type: integer
              minimum: 1
              maximum: 32
              description: >
                Maximum number of image chunks to compress concurrently while pushing.
                Default is 4.
            maxParallelImageDecompressions:
              type: integer
              minimum: 1
              maximum: 8
              description: >
                Maximum number of image chunks to decompress concurrently while pulling.
                Default is 2.
            maxParallelImageDiskWrites:
              type: integer
              minimum: 1
              maximum: 4
              description: >
                Maximum number of image chunk writes to perform concurrently while pulling.
                Default is 1.


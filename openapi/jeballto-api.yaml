openapi: 3.0.3
info:
  title: Jeballto VM Agent API
  description: REST API for managing macOS virtual machines on Apple Silicon
  version: 1.0.0-beta.1
  contact:
    name: Jeballto Project
  license:
    name: See LICENSE

servers:
  - url: http://localhost:8011/v1
    description: Local development server

security:
  - bearerAuth: []

tags:
  - name: health
    description: Health and status endpoints
  - name: vms
    description: Virtual machine management
  - name: lifecycle
    description: VM lifecycle operations
  - name: installation
    description: macOS installation
  - name: networking
    description: Network, SSH, and VNC
  - name: gui
    description: GUI window management
  - name: monitoring
    description: State and events
  - name: images
    description: OCI image management
  - name: registries
    description: OCI registry authentication
  - name: config
    description: Runtime configuration management
  - name: jeballtofiles
    description: Jeballtofile blueprint execution
  - name: system
    description: System-level operations
  - name: auth
    description: Authentication utilities

paths:
  /health:
    get:
      tags:
        - health
      summary: Health check
      description: Check agent health status
      operationId: getHealth
      security: []
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '200':
          description: Agent is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: VM persistence could not be read while building the health response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: HEALTH_CHECK_FAILED
                  message: Failed to load VM persistence

  /vms:
    post:
      tags:
        - vms
      summary: Create VM
      description: >
        Create a blank virtual machine or create one from a Jeballto OCI image.
        When `image` is provided, the endpoint performs a validated blocking
        pull before creating the VM. The image must use Jeballto VM Bundle
        Format v1. No VM is created when the implicit pull fails.
      operationId: createVM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVMRequest'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          description: Destructive maintenance is active or the image registry is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                maintenance:
                  value:
                    error:
                      code: MAINTENANCE_IN_PROGRESS
                      message: The agent is performing destructive maintenance
                registryUnavailable:
                  value:
                    error:
                      code: IMAGE_PULL_FAILED
                      message: Registry is unavailable
        '201':
          description: VM created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          description: Invalid request, image reference, or Jeballto image artifact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidRequest:
                  value:
                    error:
                      code: INVALID_REQUEST
                      message: Invalid request
                invalidReference:
                  value:
                    error:
                      code: INVALID_REFERENCE
                      message: 'Invalid image reference: registry is required'
                unsupportedImageFormat:
                  value:
                    error:
                      code: UNSUPPORTED_IMAGE_FORMAT
                      message: >-
                        Unsupported image format: unversioned images created
                        before 1.0.0 are not supported; re-push the VM using
                        Jeballto VM Bundle Format v1
                invalidImage:
                  value:
                    error:
                      code: INVALID_IMAGE
                      message: 'Invalid image: Invalid VM image config'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: A required capability is unavailable or the matching local image is in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                capabilityUnavailable:
                  value:
                    error:
                      code: CAPABILITY_UNAVAILABLE
                      message: Required image capability is unavailable
                imageInUse:
                  value:
                    error:
                      code: IMAGE_IN_USE
                      message: The matching local image is in use
        '499':
          description: The implicit image pull used for VM creation was cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: IMAGE_PULL_CANCELLED
                  message: Image pull cancelled
        '500':
          description: VM creation or its implicit image pull failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                createFailed:
                  value:
                    error:
                      code: CREATE_FAILED
                      message: VM creation failed
                imagePullFailed:
                  value:
                    error:
                      code: IMAGE_PULL_FAILED
                      message: Image pull failed
        '504':
          description: The implicit image pull used for VM creation timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: IMAGE_PULL_FAILED
                  message: Image pull timed out

    get:
      tags:
        - vms
      summary: List VMs
      description: List all virtual machines with optional pagination
      operationId: listVMs
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return (1-1000)
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          required: false
          description: Number of results to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '200':
          description: List of VMs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - vms
      summary: Wipe all VMs
      description: >
        Attempt to delete all VMs and clear their database records. Requires
        confirm=true as a safety guard. Active image operations and
        Jeballtofile executions are cancelled first. Each VM is force-stopped
        before deletion. A 200 response can report per-VM failures.
      operationId: wipeAllVMs
      parameters:
        - name: confirm
          in: query
          required: true
          description: Must be "true" to confirm the wipe operation
          schema:
            type: string
            enum:
              - 'true'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '200':
          description: Wipe completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WipeAllResponse'
        '400':
          description: Missing confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: CONFIRMATION_REQUIRED
                  message: "Add ?confirm=true to confirm deletion of all VMs"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Another destructive maintenance operation is already running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: MAINTENANCE_IN_PROGRESS
                  message: Another destructive maintenance operation is already running
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}:
    get:
      tags:
        - vms
      summary: Get VM
      description: Get virtual machine details
      operationId: getVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '200':
          description: VM details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - vms
      summary: Delete VM
      description: >
        Delete a virtual machine and its files. VMs in created, stopped, or error
        state can be deleted directly. Use force=true to stop an active VM first.
      operationId: deleteVM
      parameters:
        - $ref: '#/components/parameters/vmId'
        - name: force
          in: query
          required: false
          description: Force-stop the VM before deleting
          schema:
            type: boolean
            default: false
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          $ref: '#/components/responses/MaintenanceInProgress'
        '204':
          description: VM deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is not in a deletable state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "VM must be stopped before deletion"
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      tags:
        - vms
      summary: Update VM
      description: >
        Update name and/or resources (CPU, memory, disk) for a VM.
        Name can be changed in any non-deleted state.
        Resource changes require the VM to be stopped or created.
        Disk can only be enlarged, not shrunk. For a created VM, the requested
        size is used when installation creates Disk.img. For a stopped,
        installed VM, Disk.img is resized before the update succeeds. CPU and
        memory changes take effect on next VM start. The guest OS filesystem
        must be expanded separately after resizing an installed disk.
      operationId: updateVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVMRequest'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          $ref: '#/components/responses/MaintenanceInProgress'
        '200':
          description: VM updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is not in a valid state for resource modification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "VM must be stopped or created to update resources"
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/start:
    post:
      tags:
        - lifecycle
      summary: Start VM
      description: Start a virtual machine
      operationId: startVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          $ref: '#/components/responses/MaintenanceInProgress'
        '200':
          description: VM started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM limit reached, VM state conflict, or required capability is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                vmLimit:
                  value:
                    error:
                      code: VM_LIMIT_REACHED
                      message: Cannot start VM - 2 VMs already active (max 2)
                invalidState:
                  value:
                    error:
                      code: INVALID_STATE
                      message: Cannot start VM from its current state
                capabilityUnavailable:
                  value:
                    error:
                      code: CAPABILITY_UNAVAILABLE
                      message: "macOSVirtualization is unavailable: Requires Apple Silicon"
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/stop:
    post:
      tags:
        - lifecycle
      summary: Stop VM
      description: >
        Stop a virtual machine. Idempotent when the VM is already stopped. In
        error state, this is also the recovery action: a complete installed VM
        becomes stopped, while an incomplete installation is cleaned and
        becomes created so installation can be retried.
      operationId: stopVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          $ref: '#/components/responses/MaintenanceInProgress'
        '200':
          description: VM stopped, already stopped, or recovered from error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM state conflict or required capability is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidState:
                  value:
                    error:
                      code: INVALID_STATE
                      message: Cannot stop VM from its current state
                capabilityUnavailable:
                  value:
                    error:
                      code: CAPABILITY_UNAVAILABLE
                      message: "macOSVirtualization is unavailable: Requires Apple Silicon"
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/pause:
    post:
      tags:
        - lifecycle
      summary: Pause VM
      description: Pause a running virtual machine
      operationId: pauseVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          $ref: '#/components/responses/MaintenanceInProgress'
        '200':
          description: VM paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM state conflict or required capability is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidState:
                  value:
                    error:
                      code: INVALID_STATE
                      message: Cannot pause VM from its current state
                capabilityUnavailable:
                  value:
                    error:
                      code: CAPABILITY_UNAVAILABLE
                      message: "macOSVirtualization is unavailable: Requires Apple Silicon"
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/resume:
    post:
      tags:
        - lifecycle
      summary: Resume VM
      description: Resume a paused virtual machine
      operationId: resumeVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          $ref: '#/components/responses/MaintenanceInProgress'
        '200':
          description: VM resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM limit reached, VM state conflict, or required capability is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                vmLimit:
                  value:
                    error:
                      code: VM_LIMIT_REACHED
                      message: Cannot resume VM - 2 VMs already active (max 2)
                invalidState:
                  value:
                    error:
                      code: INVALID_STATE
                      message: Cannot resume VM from its current state
                capabilityUnavailable:
                  value:
                    error:
                      code: CAPABILITY_UNAVAILABLE
                      message: "macOSVirtualization is unavailable: Requires Apple Silicon"
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/install:
    post:
      tags:
        - installation
      summary: Install macOS
      description: Start macOS installation in the VM (async operation)
      operationId: installVM
      parameters:
        - $ref: '#/components/parameters/vmId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallVMRequest'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          $ref: '#/components/responses/MaintenanceInProgress'
        '202':
          description: Installation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM limit reached, invalid VM state, or required capability is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                vmLimit:
                  value:
                    error:
                      code: VM_LIMIT_REACHED
                      message: Cannot install - 2 VMs already active (max 2)
                installInProgress:
                  value:
                    error:
                      code: INVALID_STATE
                      message: Installation is already in progress for this VM
                capabilityUnavailable:
                  value:
                    error:
                      code: CAPABILITY_UNAVAILABLE
                      message: "macOSInstallation is unavailable: Requires macOS 26.0 or newer"
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/install/status:
    get:
      tags:
        - installation
      summary: Installation status
      description: Get macOS installation status
      operationId: getInstallStatus
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '200':
          description: Installation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /vms/{id}/ssh:
    get:
      tags:
        - networking
      summary: Get SSH info
      description: >
        Get SSH connection information. The VM must be installed (not in
        created or installing state).
      operationId: getSSHInfo
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '200':
          description: SSH connection info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: VM is not yet installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_STATE
                  message: "VM must be installed before SSH can be used"
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags:
        - networking
      summary: Enable SSH forwarding
      description: >
        Enable SSH port forwarding for a VM. Allocates a host port from the
        configured SSH port range and creates a TCP proxy to the VM's SSH
        server (port 22). The VM must be running and have a detected NAT IP.
        Idempotent - if SSH is already enabled, returns the current connection info.
        Remote Login must be enabled in the macOS guest.
      operationId: enableSSH
      parameters:
        - $ref: '#/components/parameters/vmId'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '503':
          description: Destructive maintenance is active or no configured SSH port is available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                maintenance:
                  value:
                    error:
                      code: MAINTENANCE_IN_PROGRESS
                      message: The agent is performing destructive maintenance
                portCapacity:
                  value:
                    error:
                      code: SSH_ENABLE_FAILED
                      message: No available SSH ports in configured range
        '200':
          description: SSH forwarding enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: >
            VM is not running, NAT setup is not ready, another operation owns
            this VM, or the required capability is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidState:
                  value:
                    error:
                      code: INVALID_STATE
                      message: "VM must be running to enable SSH forwarding"
                capabilityUnavailable:
                  value:
                    error:
                      code: CAPABILITY_UNAVAILABLE
                      message: "portForwarding is unavailable: Capability is disabled"
                natNotReady:
                  value:
                    error:
                      code: SSH_ENABLE_FAILED

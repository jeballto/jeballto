  /images/push:
    post:
      tags:
        - images
      summary: Push image
      description: >
        Push a VM bundle or existing local image to an OCI registry.
        Use the `source` field with format 'vm:<uuid>' or 'image:<uuid>'.
        A source VM must be stopped and its installed bundle must be complete.
        A connectivity check is performed before compression begins to fail fast
        if the registry is unavailable. The bundle is split into
        zstd-compressed chunks during transfer. The request always creates a
        push operation record. When `async` is false or omitted, the endpoint
        blocks until the push reaches a terminal status and returns the final
        operation status with `image` populated on success. When `async` is
        true, the endpoint returns immediately with the started operation status
        and a `statusUrl`; source or registry preflight failures are then recorded
        as a failed operation status. Without `timeout`, there is no caller-supplied
        deadline for the complete push. Registry reachability preflight and short
        ORAS metadata commands retain bounded internal deadlines. When set,
        `timeout` starts before source reservation and applies through durable local
        index finalization, subject to the commit-wins rules below. If it expires
        before manifest publication, the operation is cancelled and reports a
        timeout after cleanup. Blobs are uploaded first, then a validated durable
        local bundle and complete staged index are prepared before the manifest is
        published. The staged index is atomically finalized after manifest success.
        Once manifest publication starts, an unconfirmed outcome or a confirmed
        commit with failed local finalization wins a concurrent timeout and requires
        reconciliation by inspecting or pulling the reference. At most 8 pull and
        push operations may be active in total.
      operationId: pushImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushImageRequest'
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '431':
          $ref: '#/components/responses/RequestHeadersTooLarge'
        '200':
          description: Push operation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageOperationStatusResponse'
        '202':
          description: Push operation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageOperationStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/ImagePushSourceNotFound'
        '409':
          description: Source is not in a pushable state, is in use, or a required capability is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidState:
                  value:
                    error:
                      code: INVALID_STATE
                      message: "VM must be stopped before image export"
                capabilityUnavailable:
                  value:
                    error:
                      code: CAPABILITY_UNAVAILABLE
                      message: "ociImagePackaging is unavailable: Capability is disabled"
                imageInUse:
                  value:
                    error:
                      code: IMAGE_IN_USE
                      message: Source image is being deleted or exported
        '499':
          description: Image push was cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Push failed or its registry and local commit outcome requires reconciliation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                commitOutcomeUnknown:
                  value:
                    error:
                      code: IMAGE_PUSH_COMMIT_OUTCOME_UNKNOWN
                      message: Registry manifest publication started, but its commit outcome could not be confirmed
                partiallyCommitted:
                  value:
                    error:
                      code: IMAGE_PUSH_PARTIALLY_COMMITTED
                      message: Registry manifest committed, but the durable local image record could not be finalized
        '503':
          description: Destructive maintenance is active or the registry is unavailable during a blocking push
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                maintenance:
                  value:
                    error:
                      code: MAINTENANCE_IN_PROGRESS
                      message: The agent is performing destructive maintenance
                registryUnavailable:
                  value:
                    error:
                      code: IMAGE_PUSH_FAILED
                      message: Registry is unavailable
        '504':
          description: Image push timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


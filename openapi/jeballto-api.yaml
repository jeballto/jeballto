    get:
      tags:
        - config
      summary: Get config
      description: >
        Returns the current configured values. Persisted networking changes may
        still require an agent restart. Sensitive values (API token, file paths,
        binary paths) are intentionally excluded for security.
      operationId: getConfig
      responses:
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
